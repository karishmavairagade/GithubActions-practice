name: CICD

on: 
  workflow_dispatch:

jobs:
  code:
    runs-on: ubuntu-latest
    steps:
      - name: Clone the code
        run: echo "Cloning the code"
        
  build:
    needs: [code]
    runs-on: ubuntu-latest
    steps:    
      - name: Build the code
        run: echo "Building the code"
        
  test:
    needs: [build]
    runs-on: ubuntu-latest
    steps:
      - name: Build using Docker
        run: echo "Building code using docker"

  Deploy: 
    needs: [build, test]
    runs-on: ubuntu-latest
    steps:
      - name: Deploying code
        run: echo "Deploying the code"
